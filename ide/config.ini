# GRS Interpreter Configuration
# This file contains paths and settings for the GRS interpreter

# Path to the GRS interpreter executable
# Update this path to point to your compiled interpreter
# Linux/macOS example: /home/user/grs-interpreter/grs_interpreter/build/interpreter
# Windows example: C:\Users\user\grs-interpreter\grs_interpreter\build\Release\interpreter.exe
interpreter.path=../grs_interpreter/build/interpreter

# Working directory for running programs
# Default is the directory of the opened file
interpreter.workdir=auto

# Additional interpreter arguments
interpreter.args=

# Enable debug output
interpreter.debug=false

# Maximum execution time (seconds, 0 for unlimited)
interpreter.timeout=30
