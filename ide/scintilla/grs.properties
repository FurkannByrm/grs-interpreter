# GRS/KRL Language Properties for Scintilla
# Lexer configuration for GRS/KRL robot programming language
# Uses ASM lexer because it natively supports ';' as line comment

# File patterns
file.patterns.grs=*.grs;*.krl;*.src;*.dat

# Lexer - ASM lexer supports ';' line comments natively (like GRS)
lexer.$(file.patterns.grs)=asm

# Keywords (6 groups = 6 different colors)
# Set 0 - Program Structure (SCE_ASM_CPUINSTRUCTION, style 6, blue bold)
keywords.$(file.patterns.grs)=DEF END DECL

# Set 1 - Control Flow (SCE_ASM_MATHINSTRUCTION, style 7, purple bold)
keywords2.$(file.patterns.grs)=IF THEN ELSE ENDIF FOR TO STEP ENDFOR WHILE ENDWHILE REPEAT UNTIL SWITCH CASE DEFAULT ENDSWITCH GOTO HALT RETURN

# Set 2 - Data Types (SCE_ASM_REGISTER, style 8, red bold)
keywords3.$(file.patterns.grs)=INT REAL BOOL CHAR POS AXIS FRAME E6POS E6AXIS

# Set 3 - Motion Commands (SCE_ASM_DIRECTIVE, style 9, dark orange)
keywords4.$(file.patterns.grs)=PTP LIN CIRC SPLINE PTP_REL LIN_REL CIRC_REL SPLINE_REL

# Set 4 - System Commands & I/O (SCE_ASM_DIRECTIVEOPERAND, style 10, brown bold)
keywords5.$(file.patterns.grs)=WAIT DELAY IN OUT

# Set 5 - Constants & Logical Operators (SCE_ASM_EXTINSTRUCTION, style 14, teal bold)
keywords6.$(file.patterns.grs)=TRUE FALSE PI AND OR NOT

# Comment character for toggling (';' is auto-recognized by ASM lexer)
comment.line.$(file.patterns.grs)=;

# Indentation
indent.size.$(file.patterns.grs)=2
indent.maintain.$(file.patterns.grs)=1
tab.size.$(file.patterns.grs)=2
use.tabs.$(file.patterns.grs)=0

# Folding
fold.$(file.patterns.grs)=1
fold.comment.$(file.patterns.grs)=1
fold.compact.$(file.patterns.grs)=0
fold.preprocessor.$(file.patterns.grs)=0
fold.asm.syntax.based=$(file.patterns.grs)=1

# ASM Lexer Styles (SCE_ASM_*)
# 0 = Default
style.asm.0=fore:#000000
# 1 = Comment (';' line comment)
style.asm.1=fore:#008000,italics
# 2 = Number
style.asm.2=fore:#FF8000
# 3 = String (double-quoted)
style.asm.3=fore:#808080
# 4 = Operator
style.asm.4=fore:#000080,bold
# 5 = Identifier
style.asm.5=fore:#000000
# 6 = CPU Instruction (Control Flow)
style.asm.6=fore:#0000FF,bold
# 7 = Math Instruction (Data Types)
style.asm.7=fore:#8000FF,bold
# 8 = Register (Motion Commands)
style.asm.8=fore:#FF0000,bold
# 9 = Directive (Built-in Functions)
style.asm.9=fore:#FF8000
# 10 = Directive Operand (Boolean/Operators)
style.asm.10=fore:#804000,bold
# 11 = Comment Block
style.asm.11=fore:#008000,italics
# 12 = Character (single-quoted)
style.asm.12=fore:#808080
# 13 = String EOL
style.asm.13=fore:#808080
# 14 = Extended instruction (Constants & Logical: TRUE, FALSE, AND...)
style.asm.14=fore:#008080,bold

# Autocomplete settings
autocomplete.$(file.patterns.grs).start.characters=ABCDEFGHIJKLMNOPQRSTUVWXYZ_abcdefghijklmnopqrstuvwxyz
autocomplete.$(file.patterns.grs).fillups=
autocomplete.$(file.patterns.grs).ignorecase=0
autocomplete.choose.single=1

# Calltip settings
calltip.$(file.patterns.grs).word.characters=ABCDEFGHIJKLMNOPQRSTUVWXYZ_abcdefghijklmnopqrstuvwxyz0123456789
calltip.$(file.patterns.grs).parameters.start=(
calltip.$(file.patterns.grs).parameters.end=)
calltip.$(file.patterns.grs).parameters.separators=,

# Brace matching
braces.$(file.patterns.grs).style=4

# Statement indentation
statement.indent.$(file.patterns.grs)=6 DEF IF FOR WHILE SWITCH
statement.end.$(file.patterns.grs)=6 ENDDEF END ENDIF ENDFOR ENDWHILE ENDSWITCH
statement.lookback.$(file.patterns.grs)=20

# Word characters for selection
word.characters.$(file.patterns.grs)=$(chars.alpha)$(chars.numeric)_

# API file location
api.$(file.patterns.grs)=$(SciteDefaultHome)/api/grs.api
