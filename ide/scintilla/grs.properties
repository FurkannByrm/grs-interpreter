# GRS/KRL Language Properties for Scintilla
# Lexer configuration for GRS/KRL robot programming language

# File patterns
file.patterns.grs=*.grs;*.krl;*.src;*.dat

# Lexer - using CPP lexer as base
lexer.$(file.patterns.grs)=cpp

# Keywords
# Set 0 - Control Flow
keywords.$(file.patterns.grs)=DEF ENDDEF DECL IF THEN ELSE ENDIF FOR TO STEP ENDFOR \
WHILE ENDWHILE SWITCH CASE DEFAULT ENDSWITCH WAIT SEC RETURN CONTINUE BREAK

# Set 1 - Data Types
keywords2.$(file.patterns.grs)=INT REAL BOOL CHAR STRUC ENUM POS E6POS AXIS E6AXIS FRAME

# Set 2 - Motion Commands
keywords3.$(file.patterns.grs)=PTP LIN CIRC SPLINE LIN_REL PTP_REL HOME

# Set 3 - Built-in Functions
keywords4.$(file.patterns.grs)=SQRT SIN COS TAN ABS POW EXP LOG MIN MAX \
STRLEN STRFIND STRCOMP SET_PTP_VEL SET_LIN_VEL BRAKE_ON BRAKE_OFF \
STOP_ROBOT GET_POS GET_AXIS SET_TOOL SET_BASE

# Set 4 - Boolean and Operators
keywords5.$(file.patterns.grs)=TRUE FALSE NOT AND OR XOR

# Comment styles
comment.block.grs=
comment.stream.start.grs=
comment.stream.end.grs=
comment.box.start.grs=
comment.box.middle.grs=
comment.box.end.grs=

# Single line comment
comment.line.grs=;

# Indentation
indent.size.$(file.patterns.grs)=2
indent.maintain.$(file.patterns.grs)=1
tab.size.$(file.patterns.grs)=2
use.tabs.$(file.patterns.grs)=0

# Folding
fold=$(file.patterns.grs)=1
fold.comment=$(file.patterns.grs)=1
fold.compact=$(file.patterns.grs)=0
fold.preprocessor=$(file.patterns.grs)=0

# Folding keywords
fold.at.Begin=$(file.patterns.grs)=IF FOR WHILE SWITCH DEF
fold.at.End=$(file.patterns.grs)=ENDIF ENDFOR ENDWHILE ENDSWITCH ENDDEF

# Syntax coloring
# Default
style.grs.0=fore:#000000

# Comment
style.grs.1=fore:#008000,italics

# Number
style.grs.2=fore:#FF8000

# String
style.grs.6=fore:#808080

# Character
style.grs.7=fore:#808080

# Operator
style.grs.10=fore:#000080,bold

# Identifier
style.grs.11=fore:#000000

# Keyword (Control Flow)
style.grs.5=fore:#0000FF,bold

# Keyword2 (Data Types)
style.grs.16=fore:#8000FF,bold

# Keyword3 (Motion Commands)
style.grs.17=fore:#FF0000,bold

# Keyword4 (Built-in Functions)
style.grs.18=fore:#FF8000

# Keyword5 (Boolean/Operators)
style.grs.19=fore:#804000,bold

# Autocomplete settings
autocomplete.grs.start.characters=ABCDEFGHIJKLMNOPQRSTUVWXYZ_abcdefghijklmnopqrstuvwxyz
autocomplete.grs.fillups=
autocomplete.grs.ignorecase=0
autocomplete.choose.single=1

# Calltip settings
calltip.grs.word.characters=ABCDEFGHIJKLMNOPQRSTUVWXYZ_abcdefghijklmnopqrstuvwxyz0123456789
calltip.grs.parameters.start=(
calltip.grs.parameters.end=)
calltip.grs.parameters.separators=,

# Brace matching
braces.grs.style=10

# Statement indentation
statement.indent.$(file.patterns.grs)=5 IF FOR WHILE SWITCH DEF
statement.end.$(file.patterns.grs)=5 ENDIF ENDFOR ENDWHILE ENDSWITCH ENDDEF
statement.lookback.$(file.patterns.grs)=20

# Word characters for selection
word.characters.$(file.patterns.grs)=$(chars.alpha)$(chars.numeric)_

# API file location
api.$(file.patterns.grs)=$(SciteDefaultHome)/api/grs.api
